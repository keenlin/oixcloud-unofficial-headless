services:
  flclash:
    image: ghcr.io/keenlin/oixcloud-unofficial-headless:latest
    container_name: flclash
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "7890:7890"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - flclash_config:/config

volumes:
  flclash_config:
